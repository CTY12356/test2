spring.application.name=health-backend
# 若存在 src/main/resources/application-local.properties（已 gitignore），自动合并配置，覆盖同名项（如豆包 Key）
spring.config.import=optional:classpath:application-local.properties
server.port=8080
server.servlet.context-path=/api

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/health_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=050626

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto

knife4j.enable=true
springdoc.swagger-ui.path=/swagger-ui.html

app.jwt.secret=health-management-local-development-secret-key-please-change
app.jwt.expiration-seconds=604800
app.upload.root=uploads
app.upload.public-prefix=/files

# ---------- 餐食拍照识别（OpenAI 兼容多模态，可与豆包/方舟、OpenAI 等对接）----------
# 真实 API Key 放在 application-local.properties（见 .example 复制一份），勿提交该文件、勿写入本文件。
# 豆包：火山方舟控制台 https://console.volcengine.com/ark 开通服务 → API Key 管理 → 创建推理接入点（选支持「视觉」的模型）
# 将下面 model 设为「在线推理」接入点 ID（ep- 开头）；勿选「批量推理」接入点，否则无法调用 /chat/completions。
# 华北常用网关（与其他区域以控制台为准）：
# app.food-vision.base-url=https://ark.cn-beijing.volces.com/api/v3
# 鉴权：Authorization: Bearer <API Key>（与 OpenAI 形式一致，代码已按此发送）
# 示例（接入豆包时请改成你的 Key 与 ep）：
# app.food-vision.enabled=true
# app.food-vision.api-key=你的方舟APIKey
# app.food-vision.base-url=https://ark.cn-beijing.volces.com/api/v3
# app.food-vision.model=ep-20250101-xxxxx

app.food-vision.enabled=false
app.food-vision.api-key=
# 未接豆包时保持默认；接豆包请改为 https://ark.cn-beijing.volces.com/api/v3
app.food-vision.base-url=https://api.openai.com/v1
app.food-vision.model=gpt-4o-mini
